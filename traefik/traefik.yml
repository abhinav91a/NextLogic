log:
  level: INFO

api:
  dashboard: true
  insecure: false

entryPoints:
  web:
    address: ":80"
  websecure:
    address: ":443"

providers:
  docker:
    exposedByDefault: false
  file:
    directory: "/traefik"
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: "admin@nextlogic.org.uk"
      storage: "/letsencrypt/acme.json"
      httpChallenge:
        entryPoint: web
